<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mirror</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* Action popups size to content: 800×490 = 16:9 video + 40px bar
       (800×600 is Chrome's maximum for a toolbar popup) */
    html, body {
      background: #000;
      width: 800px;
      height: 490px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Video area ─────────────────────────────────────────── */
    #vwrap {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #000;
    }

    #video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #blocker {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      color: #636366;
      font: 13px/1.6 -apple-system, BlinkMacSystemFont, sans-serif;
      text-align: center;
    }
    #blocker .icon { font-size: 36px; }
    #blocker p { max-width: 320px; }

    #grantBtn {
      display: none;
      margin-top: 4px;
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      background: #0a84ff;
      color: #fff;
      font: 500 13px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      cursor: pointer;
    }
    #grantBtn:hover { background: #339dff; }

    #settingsRow {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }
    #settingsRow .hint { color: #8e8e93; font-size: 11px; }
    #settingsUrl {
      max-width: 360px;
      padding: 6px 9px;
      border-radius: 6px;
      background: #161616;
      border: 1px solid #2c2c2e;
      color: #c7c7cc;
      font: 11px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-all;
      user-select: all;
      -webkit-user-select: all;
    }
    #copyBtn {
      padding: 5px 14px;
      border: 1px solid #3a3a3c;
      border-radius: 7px;
      background: transparent;
      color: #e5e5ea;
      font: 500 12px/1 -apple-system, BlinkMacSystemFont, sans-serif;
      cursor: pointer;
    }
    #copyBtn:hover { background: #2c2c2e; }

    /* ── Status bar ─────────────────────────────────────────── */
    #bar {
      flex-shrink: 0;
      height: 40px;
      background: #1a1a1a;
      border-top: 1px solid #2c2c2e;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    /* live indicator dot */
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #3a3a3c; /* default: waiting */
    }
    .dot.live {
      background: #32d74b;
      animation: pulse 2.4s ease-in-out infinite;
    }
    .dot.err  { background: #ff453a; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .label {
      font: 500 12.5px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #e5e5ea;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 210px;
    }

    .badge {
      font: 10.5px/1 -apple-system, BlinkMacSystemFont, monospace;
      color: #48484a;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .sep {
      width: 1px;
      height: 18px;
      background: #2c2c2e;
      flex-shrink: 0;
      margin: 0 14px;
    }

    /* ── Audio meter: 8 segments ────────────────────────────── */
    #meter {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      flex-shrink: 0;
      margin-right: 7px;
    }

    .seg {
      width: 4px;
      border-radius: 2px;
      background: #2c2c2e;
      transition: background 0.05s;
    }
    /* staircase heights */
    .seg:nth-child(1), .seg:nth-child(2) { height:  7px; }
    .seg:nth-child(3), .seg:nth-child(4) { height:  9px; }
    .seg:nth-child(5), .seg:nth-child(6) { height: 11px; }
    .seg:nth-child(7), .seg:nth-child(8) { height: 13px; }

    .seg.on     { background: #32d74b; }
    .seg.hot.on { background: #ff9f0a; }

    #spacer { flex: 1; }
  </style>
</head>
<body>

<div id="vwrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="blocker">
    <span class="icon">📷</span>
    <p id="blockerMsg">Waiting for camera access…</p>
    <button id="grantBtn">Open in a tab to allow access</button>
    <div id="settingsRow">
      <span class="hint">Still blocked? Paste this into the address bar:</span>
      <code id="settingsUrl"></code>
      <button id="copyBtn">Copy link</button>
    </div>
  </div>
</div>

<div id="bar">
  <!-- Camera -->
  <div class="chip">
    <span class="dot"   id="camDot"></span>
    <span class="label" id="camLabel">Camera</span>
    <span class="badge" id="camRes"></span>
  </div>

  <div class="sep"></div>

  <!-- Mic -->
  <div class="chip">
    <span class="dot" id="micDot"></span>
    <div id="meter">
      <div class="seg"     data-i="0"></div>
      <div class="seg"     data-i="1"></div>
      <div class="seg"     data-i="2"></div>
      <div class="seg"     data-i="3"></div>
      <div class="seg"     data-i="4"></div>
      <div class="seg hot" data-i="5"></div>
      <div class="seg hot" data-i="6"></div>
      <div class="seg hot" data-i="7"></div>
    </div>
    <span class="label" id="micLabel">Microphone</span>
  </div>

  <div id="spacer"></div>
</div>

<script src="mirror.js"></script>
</body>
</html>
